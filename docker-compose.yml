# Local development only — production uses Coolify-managed Postgres
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: yaft
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5050:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
